# =============================================================================
# docker-compose.yml — Маркетинговая мультиагентная платформа
#
# Схема трассировки:
#   Go-агенты ──Jaeger Thrift HTTP──► otel-collector (:14268)
#   Оркестратор ──OTLP gRPC─────────► otel-collector (:4317)
#                                     │
#                                     ▼ OTLP gRPC
#                                   Jaeger all-in-one (:4317)
#
# Запуск:
#   docker compose up -d
#   docker compose up -d --scale segmentation=3 --scale campaign=2
#   curl -X POST http://localhost:8000/pipeline -H 'Content-Type: application/json' -d @test.json
#   docker compose logs -f
#   docker compose down
# =============================================================================

networks:
  marketing-net:
    driver: bridge

# =============================================================================
# Секция: volumes
# =============================================================================
volumes:
  nats-data:
  redis-data:
  jaeger-data:
  ollama-data:

# =============================================================================
# Секция: services
# =============================================================================
services:

  # ---------------------------------------------------------------------------
  # Брокер сообщений NATS
  # ---------------------------------------------------------------------------
  nats:
    image: nats:2.10-alpine
    container_name: nats-broker
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    command:
      - "--jetstream"
      - "--store_dir=/data"
      - "--http_port=8222"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - marketing-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis (хранение статусов pipeline)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis-store
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - marketing-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Jaeger — хранилище и UI трассировок
  # ---------------------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686"       # UI (http://localhost:16686)
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    volumes:
      - jaeger-data:/tmp
    networks:
      - marketing-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # OpenTelemetry Collector — агрегация трассировок
  # ---------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    ports:
      - "14268:14268"       # Jaeger Thrift HTTP ← Go-агенты
      - "4317:4317"         # OTLP gRPC ← оркестратор
    volumes:
      - ./otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    command:
      - "--config=/etc/otel-collector-config.yml"
    depends_on:
      - jaeger
    networks:
      - marketing-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Агент сегментации аудитории
  # ---------------------------------------------------------------------------
  segmentation:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        AGENT: segment
    container_name: agent-segmentation
    environment:
      NATS_URL: "nats://nats:4222"
      JAEGER_ENDPOINT: "http://otel-collector:14268/api/traces"
      REDIS_ADDR: "redis:6379"
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - marketing-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Агент создания рассылок
  # ---------------------------------------------------------------------------
  campaign:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        AGENT: campaign
    container_name: agent-campaign
    environment:
      NATS_URL: "nats://nats:4222"
      JAEGER_ENDPOINT: "http://otel-collector:14268/api/traces"
      REDIS_ADDR: "redis:6379"
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - marketing-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Агент анализа отклика
  # ---------------------------------------------------------------------------
  analytics:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        AGENT: analytics
    container_name: agent-analytics
    environment:
      NATS_URL: "nats://nats:4222"
      JAEGER_ENDPOINT: "http://otel-collector:14268/api/traces"
      REDIS_ADDR: "redis:6379"
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - marketing-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Агент оптимизации кампаний
  # ---------------------------------------------------------------------------
  optimizer:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        AGENT: optimizer
    container_name: agent-optimizer
    environment:
      NATS_URL: "nats://nats:4222"
      JAEGER_ENDPOINT: "http://otel-collector:14268/api/traces"
      REDIS_ADDR: "redis:6379"
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - marketing-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Scaler — автоскейлинг агентов
  # ---------------------------------------------------------------------------
  scaler:
    build:
      context: .
      dockerfile: cmd/scaler/Dockerfile
    container_name: scaler
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/project
    working_dir: /project
    environment:
      NATS_URL: "nats://nats:4222"
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - marketing-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Ollama — локальная LLM (генерация текста)
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_HOST: "0.0.0.0"
    networks:
      - marketing-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # LLM-генератор текста рассылок
  # ---------------------------------------------------------------------------
  llm_generator:
    build:
      context: ./cmd/agents/llm_generator
      dockerfile: Dockerfile
    container_name: llm-generator
    environment:
      NATS_URL: "nats://nats:4222"
      OLLAMA_URL: "http://ollama:11434"
      OLLAMA_MODEL: "llama3"
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - marketing-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Оркестратор (FastAPI)
  # ---------------------------------------------------------------------------
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: orchestrator
    ports:
      - "8000:8000"
    environment:
      NATS_URL: "nats://nats:4222"
      REDIS_URL: "redis://redis:6379/0"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      USE_LLM: "true"           # генерация текста через LLM (ollama)
      CAMPAIGN_MESSAGE_TEMPLATE: "Здравствуйте! Специальное предложение для вас."
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - marketing-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Streamlit-дашборд
  # ---------------------------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: cmd/dashboard/Dockerfile
    container_name: dashboard
    ports:
      - "8501:8501"
    environment:
      NATS_URL: "nats://nats:4222"
      NATS_HTTP: "http://nats:8222"
      REDIS_URL: "redis://redis:6379/0"
      ORCHESTRATOR_URL: "http://orchestrator:8000"
      JAEGER_UI_URL: "http://localhost:16686"
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - marketing-net
    restart: unless-stopped

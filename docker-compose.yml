# =============================================================================
# docker-compose.yml — Маркетинговая мультиагентная платформа
#
# Запуск:
#   docker compose up -d                                         # по 1 экземпляру каждого агента
#   docker compose up -d --scale segmentation=3 --scale campaign=2   # масштабирование
#   curl -X POST http://localhost:8000/pipeline -H 'Content-Type: application/json' -d @test.json
#   docker compose logs -f                                       # просмотр логов
#   docker compose down                                          # остановка
# =============================================================================

version: "3.9"

networks:
  marketing-net:
    driver: bridge

# =============================================================================
# Секция: volumes
# =============================================================================
volumes:
  nats-data:
  redis-data:

# =============================================================================
# Секция: services
# =============================================================================
services:

  # ---------------------------------------------------------------------------
  # Брокер сообщений NATS
  # ---------------------------------------------------------------------------
  nats:
    image: nats:2.10-alpine
    container_name: nats-broker
    ports:
      - "4222:4222"   # Клиентское подключение
      - "8222:8222"   # HTTP-мониторинг
    volumes:
      - nats-data:/data
    command:
      - "--jetstream"
      - "--store_dir=/data"
      - "--http_port=8222"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - marketing-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis (хранение статусов pipeline)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis-store
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - marketing-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Агент сегментации аудитории
  # ---------------------------------------------------------------------------
  segmentation:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        AGENT: segment
    container_name: agent-segmentation
    environment:
      NATS_URL: "nats://nats:4222"
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - marketing-net
    restart: unless-stopped
    # Масштабирование: docker compose up -d --scale segmentation=N
    # deploy:
    #   replicas: 2

  # ---------------------------------------------------------------------------
  # Агент создания рассылок
  # ---------------------------------------------------------------------------
  campaign:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        AGENT: campaign
    container_name: agent-campaign
    environment:
      NATS_URL: "nats://nats:4222"
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - marketing-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Агент анализа отклика
  # ---------------------------------------------------------------------------
  analytics:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        AGENT: analytics
    container_name: agent-analytics
    environment:
      NATS_URL: "nats://nats:4222"
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - marketing-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Агент оптимизации кампаний
  # ---------------------------------------------------------------------------
  optimizer:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        AGENT: optimizer
    container_name: agent-optimizer
    environment:
      NATS_URL: "nats://nats:4222"
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - marketing-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Оркестратор (FastAPI)
  # ---------------------------------------------------------------------------
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: orchestrator
    ports:
      - "8000:8000"
    environment:
      NATS_URL: "nats://nats:4222"
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - marketing-net
    restart: unless-stopped
